<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Dance Revolution</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="header-wrapper">
            <div class="header-arcade">
                <div class="header-content">
                    <span class="pro-mode">PRO MODE</span>
                    <h1 class="select-music">SELECT MUSIC</h1>
                    <span class="final-stage">Final Stage</span>
                </div>
            </div>
        </div>

        <div class="carousel-section">
            <div class="carousel-container">
                <div class="carousel-track" id="carousel-track">
                    <div class="card" data-index="0"></div>
                    <div class="card" data-index="1"></div>
                    <div class="card" data-index="2"></div>
                    <div class="card" data-index="3"></div>
                    <div class="card" data-index="4"></div>
                    <div class="card" data-index="5"></div>
                    <div class="card" data-index="6"></div>
                    <div class="card" data-index="7"></div>
                    <div class="card" data-index="8"></div>
                    <div class="card" data-index="9"></div>
                </div>
            </div>
        </div>

        <div class="controls-section">
    <div class="member-info">
        <h2 class="member-name">Luffy</h2>
        <p class="member-role">Founder</p>
    </div>

    <div class="nav-controls">
        <button class="nav-arrow left" aria-label="Anterior">
            <span class="arrow-icon"></span>
        </button>
        <button class="nav-arrow right" aria-label="Siguiente">
            <span class="arrow-icon"></span>
        </button>
    </div>
</div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
